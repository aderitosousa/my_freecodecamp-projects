
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
<h1>Checkout</h1>

<section>
    <h2>Your Cart</h2>

    <image src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="cubo magico">
</section>

<section>
    <h2>Payment Information</h2>

        <form>
        <label for="card-name">Card name<span  aria-hidden="true">*</span></label>
        <input required id="card-name" name="card-name" type="text">

        <label for="card-number">Card Number<span aria-hidden="true">*</span></label>
        <input aria-describedby="card-number-help" required id="card-number" name="card-number" type="text">
        <p id="card-number-help" >Deve conter apenas numeros</p>

        </form>
    </h2>
</section>

</body>

</html>
