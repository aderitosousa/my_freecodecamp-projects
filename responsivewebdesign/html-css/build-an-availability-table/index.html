<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Table</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <section>
            <table>
                <thead>
                    <tr >
                    <th></th>
                    <th>Monday</th>
                    <th>Tuesday</th>
                    <th>Wednesday</th>
                    </tr>

                </thead>

                <tbody>
                    <tr class="sharp">
                        <th class="time">8:00</th>
                        <td class="available-1">corpoa1</td>
                        <td class="available-5">corpoa2</td>
                        <td class="available-3">corpoa3</td>

                    </tr>
                    
                    <tr class="half">
                        <th class="time">9:00</th>
                        <td class="available-2">corpob1</td>
                        <td class="available-1">corpob2</td>
                        <td class="available-5">corpob3</td>
                    </tr>

                    <tr class="sharp">
                        <th class="time">10:00</th>

                        <td class="available-0">corpoc1</td>
                        <td class="available-2">corpoc2</td>
                        <td class="available-3">corpoc3</td>
                    </tr>

                    <tr class="half">
                        <th class="time">11:00</th>

                        <td class="available-1">corpod1</td>
                        <td class="available-4">corpod2</td>
                        <td class="available-2">corpod3</td>
                    </tr>

                    <tr class="sharp">
                        <th class="time">12:00</th>

                        <td class="available-4">corpoe1</td>
                        <td class="available-2">corpoe2</td>
                        <td class="available-0">corpoe3</td>
                    </tr>


                </tbody>
            </table>
        </section>
    </main>
<footer>
  <div id="legend">
    <span>Availability</span>
    <div id="legend-gradient"></div>
  </div>
</footer>

</body>

</html>
